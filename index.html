  <body>
    <div id="app"></div>
    <script>
      // GitHub Pages 404 redirect support: 從 sessionStorage 取回原始路徑並用 history.replaceState 設回去
      (function() {
        try {
          var redirect = sessionStorage.getItem('redirect');
          if (redirect) {
            sessionStorage.removeItem('redirect');
            history.replaceState(null, '', redirect);
          }
        } catch (e) {
          // ignore
        }
      }());
    </script>
  </body>
